modules:

  # Standard HTTP 2xx check — used for uptime monitoring
  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
      valid_status_codes:
        - 200
        - 201
        - 204
      follow_redirects: true
      preferred_ip_protocol: ip4
      fail_if_ssl: false
      fail_if_not_ssl: false

  # HTTP check that also measures response body
  http_2xx_with_body:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
      valid_status_codes:
        - 200
      fail_if_body_not_matches_regexp:
        - '.*'

  # ICMP ping — checks raw network reachability
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4

  # TCP port check
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
